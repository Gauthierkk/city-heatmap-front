<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grocery Heatmap</title>
    <!-- Warm up the OSM tile connection before MapLibre boots -->
    <link rel="preconnect" href="https://tile.openstreetmap.org" crossorigin />
    <!-- Start the default city's data fetch in parallel with JS boot. The
         %BASE_URL% prefix keeps Vite from bundling ./data/* as a build asset
         (it lives outside public/ and is served by the serve-data plugin). -->
    <link rel="preload" href="%BASE_URL%data/places/paris/food.geojson" as="fetch" />
    <link rel="preload" href="%BASE_URL%data/boundaries/paris.geojson" as="fetch" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
