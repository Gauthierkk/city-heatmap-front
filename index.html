<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grocery Heatmap</title>
    <!-- Warm up the OSM tile connection before MapLibre boots -->
    <link rel="preconnect" href="https://tile.openstreetmap.org" crossorigin />
    <!-- Start the default city's data fetch in parallel with JS boot -->
    <link rel="preload" href="data/paris/food.geojson" as="fetch" />
    <link rel="preload" href="data/paris/boundary.geojson" as="fetch" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
